<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Menu Demo - Pasta</title>

    <script type="module"
        src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
    </script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-top: 20px;
            text-align: center;
        }

        p {
            text-align: center;
            max-width: 600px;
            padding: 0 20px;
        }

        model-viewer {
            width: 100%;
            max-width: 900px;
            height: 70vh;
            background: white;
            border-radius: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>AR Menu Demo</h1>

    <p>
        Scan the QR code or tap "View in AR" below to place this dish on your table.
    </p>

    <model-viewer
        src="pasta.glb"
        alt="3D Pasta Model"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        auto-rotate
        shadow-intensity="1"
        exposure="1"
        loading="eager">
    </model-viewer>

</body>
</html>
